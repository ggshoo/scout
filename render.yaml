services:
  - type: web
    name: scout-card-game
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter shared build && pnpm --filter client build && pnpm --filter server build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
    healthCheckPath: /health
